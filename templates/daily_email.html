<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>${title}</title>
</head>
<body style="margin:0; padding:0; background:${page_bg}; font-family:${font_sans};">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">${preheader}</div>
  <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse; background:${page_bg};">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="680" style="border-collapse:collapse; width:100%; max-width:680px; background:#ffffff; border:1px solid #d9e2ec;">
          <tr>
            <td style="padding:14px 28px; background:#f7fafc; border-bottom:1px solid #d9e2ec;">
              <span style="display:inline-block; font-size:11px; line-height:1; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; color:${accent}; background:${badge_bg}; padding:8px 10px;">${badge}</span>
            </td>
          </tr>
          <tr>
            <td style="padding:30px 28px 26px 28px; background:${accent};">
              <h1 style="margin:0; font-size:30px; line-height:1.25; color:#ffffff; font-weight:700;">${headline}</h1>
              <p style="margin:10px 0 0 0; font-size:14px; line-height:1.7; color:${header_subtle};">${subhead}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">${content_blocks}</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
